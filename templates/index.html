<!DOCTYPE html>
<html lang="th">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>TrueMoney · Personalized Campaigns</title>
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
   <style>
       :root {
           --tm-orange:#FF6600; --tm-orange-hover:#E55C00; --tm-orange-light:#FFF0E6;
           --tm-dark:#1F1F1F; --tm-gray-bg:#F4F5F8; --tm-text-main:#333333;
           --tm-text-muted:#7A7A7A; --tm-border:#EAEAEA; --white:#FFFFFF;
       }
       *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
       body{background:var(--tm-gray-bg);font-family:'Prompt',sans-serif;color:var(--tm-text-main);min-height:100vh}

       .header{background:var(--white);height:70px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;box-shadow:0 2px 10px rgba(0,0,0,.05);position:sticky;top:0;z-index:100;border-bottom:3px solid var(--tm-orange)}
       .brand{display:flex;align-items:center;gap:12px}
       .logo-box{background:var(--tm-orange);color:var(--white);font-weight:700;font-size:18px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:10px}
       .brand-name{font-size:20px;font-weight:700;color:var(--tm-dark)}.brand-name span{color:var(--tm-orange)}
       .status-bar{display:flex;gap:20px;align-items:center;font-size:13px}
       .live-indicator{display:flex;align-items:center;gap:6px;background:var(--tm-orange-light);color:var(--tm-orange);padding:6px 12px;border-radius:20px;font-weight:600}
       .dot{width:8px;height:8px;background:var(--tm-orange);border-radius:50%;animation:pulse 1.5s infinite}
       @keyframes pulse{0%{transform:scale(.9);opacity:.7}50%{transform:scale(1.2);opacity:1}100%{transform:scale(.9);opacity:.7}}

       /* Event log bar */
       #event-log{background:#1a1a1a;color:#00ff88;font-family:monospace;font-size:12px;padding:6px 20px;max-height:80px;overflow-y:auto;line-height:1.7}
       .log-IMPRESSION{color:#60a5fa}
       .log-OPEN{color:#4ade80}
       .log-DISMISS{color:#f87171}
       .log-INFO{color:#888}

       .container{max-width:1400px;margin:0 auto;padding:30px 40px;display:flex;flex-direction:column;gap:30px}
       .user-row{background:var(--white);border-radius:16px;padding:24px;box-shadow:0 4px 15px rgba(0,0,0,.03);animation:fadeIn .4s ease-out}
       @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
       .user-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:15px;border-bottom:1px solid var(--tm-border)}
       .user-info{display:flex;align-items:center;gap:15px}
       .user-avatar{width:45px;height:45px;background:var(--tm-dark);color:var(--white);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px}
       .user-details h3{font-size:18px;font-weight:600}.user-details p{font-size:13px;color:var(--tm-text-muted)}
       .camp-count{background:var(--tm-gray-bg);padding:6px 14px;border-radius:8px;font-size:14px;font-weight:600}
       .cards-scroll-container{display:flex;gap:20px;overflow-x:auto;padding-bottom:15px;scroll-snap-type:x mandatory;scroll-behavior:smooth}
       .cards-scroll-container::-webkit-scrollbar{height:8px}
       .cards-scroll-container::-webkit-scrollbar-track{background:var(--tm-gray-bg);border-radius:4px}
       .cards-scroll-container::-webkit-scrollbar-thumb{background:#d0d0d0;border-radius:4px}

       .camp-card{min-width:300px;max-width:300px;flex-shrink:0;background:var(--white);border:1px solid var(--tm-border);border-radius:12px;overflow:hidden;scroll-snap-align:start;transition:transform .2s,box-shadow .2s;position:relative}
       .camp-card:hover{transform:translateY(-4px);box-shadow:0 10px 25px rgba(0,0,0,.08);border-color:var(--tm-orange)}
       .card-image{width:100%;height:140px;background-color:var(--tm-gray-bg);object-fit:cover;border-bottom:1px solid var(--tm-border)}
       .rank-badge{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.7);color:var(--white);backdrop-filter:blur(4px);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
       .camp-card[data-rank="1"] .rank-badge{background:var(--tm-orange)}
       .card-body{padding:16px}
       .card-title{font-size:15px;font-weight:600;line-height:1.4;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
       .card-desc{font-size:13px;color:var(--tm-text-muted);line-height:1.5;margin-bottom:16px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;height:58px}
       .card-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;padding-top:12px;border-top:1px dashed var(--tm-border)}
       .meta-chip{background:var(--tm-gray-bg);color:var(--tm-text-muted);font-size:10px;padding:4px 8px;border-radius:4px;font-weight:500}
       .card-actions{display:flex;gap:10px}
       .btn{flex:1;padding:10px;border-radius:8px;font-family:'Prompt',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .2s;border:none}
       .btn-dismiss{background:var(--tm-gray-bg);color:var(--tm-text-main)}.btn-dismiss:hover{background:#e2e2e2}
       .btn-open{background:var(--tm-orange);color:var(--white)}.btn-open:hover{background:var(--tm-orange-hover)}
       .empty-state{width:100%;padding:40px;text-align:center;color:var(--tm-text-muted);font-size:14px;background:var(--tm-gray-bg);border-radius:12px;border:1px dashed #ccc}
       .camp-card.dismissing{transform:scale(.9);opacity:0;transition:all .3s ease}
   </style>
</head>
<body>
   <header class="header">
       <div class="brand">
           <div class="logo-box">TM</div>
           <div class="brand-name">True<span>Money</span></div>
       </div>
       <div class="status-bar">
           <div>Live Monitor</div>
           <div class="live-indicator"><div class="dot"></div> Connected</div>
       </div>
   </header>

   <!-- Event log terminal bar -->
   <div id="event-log">
       <span class="log-INFO">▶ Buddy Engine — waiting for campaigns...</span>
   </div>

   <div class="container" id="dashboard-container"></div>

   <script>
       const REWARD_MAP = { OPEN: 1.0, DISMISS: -0.5, IMPRESSION: 0.0 };
       const dashboard  = document.getElementById('dashboard-container');
       const eventLog   = document.getElementById('event-log');

       // ── Event log bar ────────────────────────────────────────────
       function addLog(type, msg) {
           const now  = new Date().toLocaleTimeString('th-TH');
           const line = document.createElement('span');
           line.className = `log-${type}`;
           line.textContent = `\n${now} [${type}] ${msg}`;
           eventLog.appendChild(line);
           eventLog.scrollTop = eventLog.scrollHeight;
       }

       // ── logAction → POST /api/log_action ─────────────────────────
       async function logAction(impressionId, actionType) {
           const reward = REWARD_MAP[actionType] ?? 0.0;
           try {
               const res = await fetch('/api/log_action', {
                   method:  'POST',
                   headers: { 'Content-Type': 'application/json' },
                   body:    JSON.stringify({
                       impression_id: impressionId,
                       action_type:   actionType,
                       reward_value:  reward,
                   }),
               });
               // ตรวจสอบ content-type ก่อน parse JSON เพื่อป้องกัน SyntaxError
               const ct = res.headers.get('content-type') || '';
               if (!ct.includes('application/json')) {
                   const txt = await res.text();
                   addLog('INFO', `⚠️ Server returned non-JSON (${res.status}): ${txt.slice(0,80)}`);
                   console.error('[logAction] non-JSON response:', res.status, txt.slice(0, 200));
                   return;
               }
               const data = await res.json();
               const pub  = data.status === 'success' ? '→ Pub/Sub ✅' : `→ ${data.status}`;
               const rsign = reward >= 0 ? `+${reward}` : `${reward}`;
               addLog(actionType, `imp=${impressionId.slice(0,8)}… reward=${rsign} ${pub}`);
           } catch (e) {
               addLog('INFO', `⚠️ logAction error: ${e.message}`);
               console.error('[logAction] exception:', e);
           }
       }

       // ── handleAction (OPEN / DISMISS) ────────────────────────────
       function handleAction(btnElement, impressionId, actionType, link = null) {
           const card      = btnElement.closest('.camp-card');
           const container = card.parentElement;
           const userId    = container.id.replace('scroll-container-', '');

           if (card.dataset.actioned) return;
           card.dataset.actioned = actionType;

           logAction(impressionId, actionType);

           card.classList.add('dismissing');
           setTimeout(() => {
               card.remove();
               const remaining = container.querySelectorAll('.camp-card').length;
               document.getElementById(`count-${userId}`).textContent = remaining;
               if (remaining === 0)
                   container.innerHTML = `<div class="empty-state">ผู้ใช้นี้จัดการแคมเปญครบหมดแล้ว</div>`;
           }, 300);

           if (actionType === 'OPEN' && link && link !== 'undefined')
               window.open(link, '_blank');
       }

       // ── handleIncomingCampaign ────────────────────────────────────
       function handleIncomingCampaign(data, isNew = false) {
           const userId  = data.user_id || 'Unknown';
           let   userRow = document.getElementById(`user-row-${userId}`);

           if (!userRow) {
               userRow = document.createElement('div');
               userRow.id = `user-row-${userId}`;
               userRow.className = 'user-row';
               const initials = String(userId).slice(-2).toUpperCase() || 'U';
               userRow.innerHTML = `
                   <div class="user-header">
                       <div class="user-info">
                           <div class="user-avatar">${initials}</div>
                           <div class="user-details">
                               <h3>User: ${userId}</h3>
                               <p>Personalized Recommendations</p>
                           </div>
                       </div>
                       <div class="camp-count"><span id="count-${userId}">0</span> Campaigns</div>
                   </div>
                   <div class="cards-scroll-container" id="scroll-container-${userId}"></div>`;
               dashboard.appendChild(userRow);
           }

           const container = userRow.querySelector('.cards-scroll-container');
           if (document.getElementById(`card-${data.impression_id}`)) return;

           if (isNew) {
               const meta = data.metadata || {};
               addLog('IMPRESSION', `user=${userId} | arm=${meta.arm_campaign||'?'} | domain=${meta.domain||'?'} | 📬 shown`);
           }

           const randomSeed = data.id.replace(/[^a-zA-Z0-9]/g, '').slice(0, 5);
           const imageUrl   = `https://picsum.photos/seed/${randomSeed}/300/140`;
           const meta       = data.metadata || {};

           const card = document.createElement('div');
           card.className = 'camp-card';
           card.id = `card-${data.impression_id}`;
           card.setAttribute('data-rank', data.rank || 99);
           card.innerHTML = `
               <img src="${imageUrl}" alt="Campaign" class="card-image" loading="lazy">
               <div class="rank-badge">Rank #${data.rank || '-'}</div>
               <div class="card-body">
                   <div class="card-title">${data.title}</div>
                   <div class="card-desc">${data.key_message}</div>
                   <div class="card-meta">
                       <span class="meta-chip">⭐ ${meta.bandit_score || 'N/A'}</span>
                       <span class="meta-chip">📂 ${meta.domain || 'N/A'}</span>
                   </div>
                   <div class="card-actions">
                       <button class="btn btn-dismiss" onclick="handleAction(this,'${data.impression_id}','DISMISS')">ปิด</button>
                       <button class="btn btn-open"    onclick="handleAction(this,'${data.impression_id}','OPEN','${data.link}')">${data.cta || 'ดูรายละเอียด'}</button>
                   </div>
               </div>`;

           const existingCards = Array.from(container.children);
           existingCards.push(card);
           existingCards.sort((a, b) => parseInt(a.getAttribute('data-rank')) - parseInt(b.getAttribute('data-rank')));
           container.innerHTML = '';
           existingCards.forEach(c => container.appendChild(c));
           document.getElementById(`count-${userId}`).textContent = container.children.length;
       }

       // ── Init ──────────────────────────────────────────────────────
       async function loadHistory() {
           try {
               const res  = await fetch('/api/history');
               const data = await res.json();
               data.history.forEach(c => handleIncomingCampaign(c, false));
           } catch (e) { addLog('INFO', `loadHistory error: ${e}`); }
       }
       window.onload = loadHistory;

       const ws = new WebSocket(`ws://${window.location.host}/ws`);
       ws.onopen    = () => addLog('INFO', 'WebSocket connected ✅');
       ws.onmessage = (ev) => handleIncomingCampaign(JSON.parse(ev.data), true);
       ws.onclose   = () => addLog('INFO', 'WebSocket disconnected — refresh page');
   </script>
</body>
</html>
